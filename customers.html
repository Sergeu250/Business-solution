<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customers — BizFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --brand:      #0A7C59;
      --brand-dark: #065C42;
      --brand-pale: #E8F5F0;
      --accent:     #F4A024;
      --dark:       #111827;
      --mid:        #374151;
      --muted:      #6B7280;
      --border:     #E5E7EB;
      --light:      #F9FAFB;
      --white:      #FFFFFF;
      --danger:     #EF4444;
      --sidebar-w:  240px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--light);
      color: var(--dark);
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR (same as stock.html) ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--dark);
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      position: fixed;
      inset: 0 auto 0 0;
    }
    .sidebar .logo {
      font-size: 20px; font-weight: 800;
      color: var(--white); letter-spacing: -0.5px;
      margin-bottom: 32px; padding: 0 4px;
    }
    .sidebar .logo span { color: var(--accent); }

    .nav-label {
      font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1.2px; text-transform: uppercase;
      padding: 0 8px; margin-bottom: 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      color: rgba(255,255,255,0.6);
      font-size: 14px; font-weight: 500;
      text-decoration: none; cursor: pointer;
      transition: background .15s, color .15s;
      margin-bottom: 2px;
      border: none; background: transparent; width: 100%; text-align: left;
      font-family: 'Inter', sans-serif;
    }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: var(--white); }
    .nav-item.active { background: var(--brand); color: var(--white); }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-bottom { margin-top: auto; }
    .user-chip {
      background: rgba(255,255,255,0.07);
      border-radius: 10px; padding: 12px; margin-bottom: 8px;
    }
    .user-chip .name { font-size: 13px; font-weight: 600; color: var(--white); }
    .user-chip .email { font-size: 11px; color: rgba(255,255,255,0.45); margin-top: 2px; }
    .logout-btn {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 10px 12px;
      border: none; border-radius: 8px;
      background: transparent; color: rgba(255,255,255,0.5);
      font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: background .15s, color .15s;
    }
    .logout-btn:hover { background: rgba(239,68,68,0.15); color: #FCA5A5; }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 20px 36px;
    }
    .topbar h1 { font-size: 20px; font-weight: 800; color: var(--dark); letter-spacing: -0.5px; }
    .topbar p { font-size: 13px; color: var(--muted); margin-top: 2px; }

    .content { padding: 32px 36px; }

    /* STATS */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 20px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--white); border-radius: 14px;
      padding: 24px; border: 1px solid var(--border);
    }
    .stat-card .stat-label {
      font-size: 12px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px;
    }
    .stat-card .stat-value { font-size: 28px; font-weight: 800; color: var(--dark); letter-spacing: -1px; }
    .stat-card.highlight { background: var(--brand); border-color: transparent; }
    .stat-card.highlight .stat-label { color: rgba(255,255,255,0.7); }
    .stat-card.highlight .stat-value { color: var(--white); }

    /* SEARCH */
    .search-bar {
      margin-bottom: 20px;
    }
    .search-bar input {
      width: 100%; max-width: 360px;
      padding: 10px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px; font-family: 'Inter', sans-serif;
      color: var(--dark); outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    .search-bar input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(10,124,89,0.1);
    }

    /* TABLE */
    .table-section {
      background: var(--white);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .table-header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .table-header h2 { font-size: 16px; font-weight: 700; }
    .badge {
      font-size: 12px; font-weight: 600; color: var(--brand);
      background: var(--brand-pale); padding: 4px 10px; border-radius: 100px;
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--light); padding: 12px 20px; text-align: left;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 20px; font-size: 14px; color: var(--mid);
      border-bottom: 1px solid #F3F4F6;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FAFAFA; }
    td.primary { font-weight: 600; color: var(--dark); }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--brand);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: white;
      margin-right: 10px; vertical-align: middle;
    }

    .pw-mask {
      font-family: monospace; letter-spacing: 2px; color: #9CA3AF;
      cursor: pointer; user-select: none;
    }
    .pw-mask:hover { color: var(--dark); }

    .delete-btn {
      padding: 6px 14px;
      background: #FEF2F2; color: var(--danger);
      border: 1px solid #FECACA; border-radius: 6px;
      font-size: 12px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background .15s;
    }
    .delete-btn:hover { background: #FEE2E2; }

    .empty-state {
      text-align: center; padding: 60px 20px; color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 6px; }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .stats-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">Biz<span>Flow</span></div>

  <div>
    <div class="nav-label">Menu</div>
    <a href="stock.html" class="nav-item"><span class="icon">📦</span> Inventory</a>
    <div class="nav-item active"><span class="icon">👥</span> Customers</div>
  </div>

  <div class="sidebar-bottom">
    <div class="user-chip">
      <div class="name" id="sidebarBiz">—</div>
      <div class="email" id="sidebarEmail">—</div>
    </div>
    <button class="logout-btn" onclick="logout()"><span>⎋</span> Log out</button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <h1>Customers</h1>
    <p>All registered businesses on BizFlow</p>
  </div>

  <div class="content">
    <div class="stats-row">
      <div class="stat-card highlight">
        <div class="stat-label">Total Customers</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Registered This Session</div>
        <div class="stat-value" id="statSession">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Verified TINs</div>
        <div class="stat-value" id="statTin">0</div>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="search" placeholder="🔍  Search by name, email, or TIN…" oninput="filterTable()" />
    </div>

    <div class="table-section">
      <div class="table-header">
        <h2>Registered Accounts</h2>
        <div class="badge" id="countBadge">0 customers</div>
      </div>
      <div id="tableWrap"></div>
    </div>
  </div>
</div>

<script>
  const currentUser = JSON.parse(localStorage.getItem('loggedInUser'));
  if (!currentUser) { window.location.href = 'login.html'; }
  document.getElementById('sidebarBiz').textContent  = currentUser.business;
  document.getElementById('sidebarEmail').textContent = currentUser.email;

  let users = JSON.parse(localStorage.getItem('users')) || [];
  let filtered = [...users];

  function initials(biz) {
    return biz.trim().split(/\s+/).slice(0,2).map(w => w[0]).join('').toUpperCase();
  }

  function togglePw(el, pw) {
    el.textContent = el.dataset.revealed === '1' ? '••••••••' : pw;
    el.dataset.revealed = el.dataset.revealed === '1' ? '0' : '1';
  }

  function renderTable(list) {
    const wrap = document.getElementById('tableWrap');
    if (list.length === 0) {
      wrap.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">👥</div>
          <h3>No customers found</h3>
          <p>No registered accounts match your search.</p>
        </div>`;
      return;
    }

    let rows = list.map((u, i) => {
      const idx = users.indexOf(u);
      return `
        <tr>
          <td class="primary">
            <span class="avatar">${initials(u.business)}</span>${esc(u.business)}
          </td>
          <td>${esc(u.email)}</td>
          <td>${esc(u.tin)}</td>
          <td>
            <span class="pw-mask" data-revealed="0" onclick="togglePw(this,'${esc(u.password)}')">••••••••</span>
          </td>
          <td><button class="delete-btn" onclick="del(${idx})">Remove</button></td>
        </tr>`;
    }).join('');

    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Business Name</th>
            <th>Email</th>
            <th>TIN</th>
            <th>Password</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  function updateStats() {
    users = JSON.parse(localStorage.getItem('users')) || [];
    document.getElementById('statTotal').textContent   = users.length;
    document.getElementById('statTin').textContent     = users.filter(u => u.tin).length;
    document.getElementById('statSession').textContent = users.length > 0 ? users.length : '—';
    document.getElementById('countBadge').textContent  = users.length + (users.length === 1 ? ' customer' : ' customers');
  }

  function filterTable() {
    const q = document.getElementById('search').value.toLowerCase();
    filtered = users.filter(u =>
      u.business.toLowerCase().includes(q) ||
      u.email.toLowerCase().includes(q) ||
      u.tin.toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  function del(idx) {
    if (!confirm('Remove this customer?')) return;
    users.splice(idx, 1);
    localStorage.setItem('users', JSON.stringify(users));
    filtered = [...users];
    updateStats();
    filterTable();
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function logout() {
    localStorage.removeItem('loggedInUser');
    window.location.href = 'login.html';
  }

  updateStats();
  renderTable(users);
</script>
</body>
</html>
