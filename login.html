<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — BizFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --brand:      #0A7C59;
      --brand-dark: #065C42;
      --brand-pale: #E8F5F0;
      --accent:     #F4A024;
      --dark:       #111827;
      --mid:        #374151;
      --muted:      #6B7280;
      --border:     #E5E7EB;
      --light:      #F9FAFB;
      --white:      #FFFFFF;
      --error:      #EF4444;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--light);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--white);
      border-radius: 20px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.1);
      overflow: hidden;
      width: 100%;
      max-width: 440px;
    }

    .card-top {
      background: var(--brand);
      padding: 36px 40px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card-top::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(244,160,36,.35), transparent 70%);
    }
    .logo {
      font-size: 24px; font-weight: 800;
      color: var(--white); letter-spacing: -0.5px;
      margin-bottom: 8px;
    }
    .logo span { color: var(--accent); }
    .card-top p {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
    }

    .card-body { padding: 36px 40px; }

    .card-body h3 {
      font-size: 22px; font-weight: 800;
      color: var(--dark); letter-spacing: -0.5px;
      margin-bottom: 4px;
    }
    .card-body .sub {
      font-size: 14px; color: var(--muted);
      margin-bottom: 28px;
    }

    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 13px; font-weight: 600;
      color: var(--mid); margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px; font-family: 'Inter', sans-serif;
      color: var(--dark); background: var(--white);
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(10,124,89,0.1);
    }
    .field input::placeholder { color: #9CA3AF; }

    .submit-btn {
      width: 100%; padding: 13px;
      background: var(--brand); color: var(--white);
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background .15s, transform .1s;
      margin-top: 4px;
    }
    .submit-btn:hover { background: var(--brand-dark); transform: translateY(-1px); }

    #message {
      font-size: 13px; font-weight: 500;
      padding: 10px; border-radius: 8px;
      background: #FEF2F2; color: var(--error);
      text-align: center; margin-top: 12px;
      display: none;
    }
    #message.show { display: block; }

    .switch-link {
      text-align: center;
      margin-top: 22px;
      font-size: 14px;
      color: var(--muted);
    }
    .switch-link a { color: var(--brand); font-weight: 600; text-decoration: none; }
    .switch-link a:hover { text-decoration: underline; }

    .back-home {
      display: block; text-align: center;
      font-size: 13px; color: var(--muted);
      text-decoration: none; margin-top: 12px;
      padding: 8px;
    }
    .back-home:hover { color: var(--brand); }
  </style>
</head>
<body>

<div class="card">
  <div class="card-top">
    <div class="logo">Biz<span>Flow</span></div>
    <p>Business Management for Rwanda</p>
  </div>
  <div class="card-body">
    <h3>Welcome back</h3>
    <p class="sub">Log in to your business account.</p>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@yourbusiness.com" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" required />
      </div>
      <button type="submit" class="submit-btn">Log In →</button>
      <div id="message">Invalid email or password. Please try again.</div>
    </form>

    <div class="switch-link">
      No account yet? <a href="register.html">Create one free</a>
    </div>
    <a href="index.html" class="back-home">← Back to home</a>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const msg      = document.getElementById('message');

  const users    = JSON.parse(localStorage.getItem('users')) || [];
  const found    = users.find(u => u.email === email && u.password === password);

  if (found) {
    localStorage.setItem('loggedInUser', JSON.stringify(found));
    window.location.href = 'stock.html';
  } else {
    msg.classList.add('show');
  }
});
</script>
</body>
</html>
