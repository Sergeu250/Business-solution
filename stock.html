<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — BizFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --brand:      #0A7C59;
      --brand-dark: #065C42;
      --brand-pale: #E8F5F0;
      --accent:     #F4A024;
      --dark:       #111827;
      --mid:        #374151;
      --muted:      #6B7280;
      --border:     #E5E7EB;
      --light:      #F9FAFB;
      --white:      #FFFFFF;
      --danger:     #EF4444;
      --sidebar-w:  240px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--light);
      color: var(--dark);
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--dark);
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      position: fixed;
      inset: 0 auto 0 0;
    }
    .sidebar .logo {
      font-size: 20px; font-weight: 800;
      color: var(--white); letter-spacing: -0.5px;
      margin-bottom: 32px; padding: 0 4px;
    }
    .sidebar .logo span { color: var(--accent); }

    .nav-section { margin-bottom: 8px; }
    .nav-label {
      font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1.2px; text-transform: uppercase;
      padding: 0 8px; margin-bottom: 6px;
    }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: 8px;
      color: rgba(255,255,255,0.6);
      font-size: 14px; font-weight: 500;
      text-decoration: none; cursor: pointer;
      transition: background .15s, color .15s;
      margin-bottom: 2px;
      border: none; background: transparent; width: 100%; text-align: left;
      font-family: 'Inter', sans-serif;
    }
    .nav-item:hover { background: rgba(255,255,255,0.06); color: var(--white); }
    .nav-item.active { background: var(--brand); color: var(--white); }
    .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }

    .sidebar-bottom { margin-top: auto; }
    .user-chip {
      background: rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .user-chip .name {
      font-size: 13px; font-weight: 600;
      color: var(--white);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .user-chip .email {
      font-size: 11px; color: rgba(255,255,255,0.45);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }
    .logout-btn {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 10px 12px;
      border: none; border-radius: 8px;
      background: transparent; color: rgba(255,255,255,0.5);
      font-size: 14px; font-weight: 500;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: background .15s, color .15s;
    }
    .logout-btn:hover { background: rgba(239,68,68,0.15); color: #FCA5A5; }

    /* ── MAIN ── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 20px 36px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar h1 { font-size: 20px; font-weight: 800; color: var(--dark); letter-spacing: -0.5px; }
    .topbar .welcome { font-size: 13px; color: var(--muted); }

    .content { padding: 32px 36px; }

    /* STATS ROW */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--white);
      border-radius: 14px;
      padding: 24px;
      border: 1px solid var(--border);
    }
    .stat-card .stat-label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 8px; }
    .stat-card .stat-value { font-size: 28px; font-weight: 800; color: var(--dark); letter-spacing: -1px; }
    .stat-card.highlight { background: var(--brand); border-color: transparent; }
    .stat-card.highlight .stat-label { color: rgba(255,255,255,0.7); }
    .stat-card.highlight .stat-value { color: var(--white); }

    /* ADD PRODUCT */
    .add-section {
      background: var(--white);
      border-radius: 14px;
      padding: 28px 32px;
      border: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .add-section h2 { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 20px; }

    .add-form {
      display: grid;
      grid-template-columns: 1fr 140px 140px auto;
      gap: 12px;
      align-items: end;
    }
    .form-field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--mid); margin-bottom: 6px;
    }
    .form-field input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px; font-family: 'Inter', sans-serif;
      color: var(--dark); background: var(--white);
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    .form-field input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(10,124,89,0.1);
    }
    .add-btn {
      padding: 10px 22px;
      background: var(--brand); color: var(--white);
      border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer; white-space: nowrap;
      transition: background .15s;
    }
    .add-btn:hover { background: var(--brand-dark); }

    /* TABLE */
    .table-section {
      background: var(--white);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .table-header {
      padding: 20px 28px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .table-header h2 { font-size: 16px; font-weight: 700; color: var(--dark); }
    .product-count {
      font-size: 12px; font-weight: 600;
      color: var(--brand);
      background: var(--brand-pale);
      padding: 4px 10px; border-radius: 100px;
    }

    table { width: 100%; border-collapse: collapse; }
    th {
      background: var(--light);
      padding: 12px 20px;
      text-align: left;
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 14px 20px;
      font-size: 14px; color: var(--mid);
      border-bottom: 1px solid #F3F4F6;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FAFAFA; }
    td.product-name { font-weight: 600; color: var(--dark); }
    td.total-val { font-weight: 700; color: var(--brand); }

    .delete-btn {
      padding: 6px 14px;
      background: #FEF2F2; color: var(--danger);
      border: 1px solid #FECACA; border-radius: 6px;
      font-size: 12px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: background .15s;
    }
    .delete-btn:hover { background: #FEE2E2; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 6px; }
    .empty-state p { font-size: 14px; }

    @media (max-width: 900px) {
      .sidebar { display: none; }
      .main { margin-left: 0; }
      .add-form { grid-template-columns: 1fr 1fr; }
      .add-btn { grid-column: 1 / -1; }
      .stats-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="logo">Biz<span>Flow</span></div>

  <div class="nav-section">
    <div class="nav-label">Menu</div>
    <div class="nav-item active"><span class="icon">📦</span> Inventory</div>
    <a href="customers.html" class="nav-item"><span class="icon">👥</span> Customers</a>
  </div>

  <div class="sidebar-bottom">
    <div class="user-chip">
      <div class="name" id="sidebarBiz">Loading…</div>
      <div class="email" id="sidebarEmail"></div>
    </div>
    <button class="logout-btn" onclick="logout()">
      <span>⎋</span> Log out
    </button>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div>
      <div class="h1" style="font-size:20px;font-weight:800;letter-spacing:-0.5px">Inventory</div>
      <div class="welcome" id="welcomeText"></div>
    </div>
  </div>

  <div class="content">
    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Products</div>
        <div class="stat-value" id="statProducts">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Items in Stock</div>
        <div class="stat-value" id="statQty">0</div>
      </div>
      <div class="stat-card highlight">
        <div class="stat-label">Grand Total Value</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
    </div>

    <!-- ADD PRODUCT -->
    <div class="add-section">
      <h2>Add a Product</h2>
      <form id="addForm" class="add-form">
        <div class="form-field">
          <label for="name">Product name</label>
          <input type="text" id="name" placeholder="e.g. Indomie Noodles" required />
        </div>
        <div class="form-field">
          <label for="quantity">Quantity</label>
          <input type="number" id="quantity" placeholder="0" min="0" required />
        </div>
        <div class="form-field">
          <label for="price">Price (RWF)</label>
          <input type="number" id="price" placeholder="0" min="0" step="any" required />
        </div>
        <button type="submit" class="add-btn">+ Add</button>
      </form>
    </div>

    <!-- PRODUCT TABLE -->
    <div class="table-section">
      <div class="table-header">
        <h2>Products</h2>
        <div class="product-count" id="productCount">0 items</div>
      </div>
      <div id="tableWrap">
        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>Quantity</th>
              <th>Unit Price (RWF)</th>
              <th>Total Value (RWF)</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
  // AUTH CHECK
  const currentUser = JSON.parse(localStorage.getItem('loggedInUser'));
  if (!currentUser) { window.location.href = 'login.html'; }

  document.getElementById('sidebarBiz').textContent  = currentUser.business;
  document.getElementById('sidebarEmail').textContent = currentUser.email;
  document.getElementById('welcomeText').textContent  = 'Welcome, ' + currentUser.business;

  const KEY      = 'products_' + currentUser.email;
  let products   = JSON.parse(localStorage.getItem(KEY)) || [];

  function save() { localStorage.setItem(KEY, JSON.stringify(products)); }

  function fmt(n) {
    return Number(n).toLocaleString('en-RW');
  }

  function render() {
    const tbody   = document.getElementById('tbody');
    const wrap    = document.getElementById('tableWrap');
    let totalVal  = 0;
    let totalQty  = 0;

    tbody.innerHTML = '';

    if (products.length === 0) {
      wrap.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📦</div>
          <h3>No products yet</h3>
          <p>Add your first product using the form above.</p>
        </div>`;
    } else {
      if (!document.querySelector('#tableWrap table')) {
        wrap.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th>Unit Price (RWF)</th>
                <th>Total Value (RWF)</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>`;
      }
      const tb = document.getElementById('tbody') || tbody;
      products.forEach((p, i) => {
        const total = p.quantity * p.price;
        totalVal += total;
        totalQty += p.quantity;
        tb.innerHTML += `
          <tr>
            <td class="product-name">${esc(p.name)}</td>
            <td>${fmt(p.quantity)}</td>
            <td>${fmt(p.price)}</td>
            <td class="total-val">${fmt(total)}</td>
            <td><button class="delete-btn" onclick="del(${i})">Remove</button></td>
          </tr>`;
      });
    }

    document.getElementById('statProducts').textContent = products.length;
    document.getElementById('statQty').textContent      = fmt(totalQty);
    document.getElementById('statTotal').textContent    = fmt(totalVal);
    document.getElementById('productCount').textContent = products.length + (products.length === 1 ? ' item' : ' items');
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('addForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name     = document.getElementById('name').value.trim();
    const quantity = parseInt(document.getElementById('quantity').value);
    const price    = parseFloat(document.getElementById('price').value);
    products.push({ name, quantity, price });
    save();
    render();
    this.reset();
  });

  function del(i) {
    products.splice(i, 1);
    save();
    render();
  }

  function logout() {
    localStorage.removeItem('loggedInUser');
    window.location.href = 'login.html';
  }

  render();
</script>
</body>
</html>
